<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61cdff"/>
      <stop offset="100%" stop-color="#aa8bff"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#61cdff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#61cdff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#aa8bff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#aa8bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="400" fill="url(#orb1)"/>
  <circle cx="1000" cy="450" r="350" fill="url(#orb2)"/>

  <!-- Grid lines -->
  <g opacity="0.03" stroke="#61cdff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo icon -->
  <rect x="80" y="80" width="60" height="60" rx="16" fill="url(#grad)"/>
  <path d="M110 95 L124 115 L110 113 L124 135 L96 113 L110 115 Z" fill="#004259"/>

  <!-- Brand name -->
  <text x="155" y="122" font-family="'Arial Black', sans-serif" font-size="28" font-weight="900" fill="url(#grad)">Evo Digital</text>

  <!-- Badge -->
  <rect x="80" y="175" width="220" height="34" rx="17" fill="#61cdff" fill-opacity="0.1" stroke="#61cdff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="190" y="197" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#61cdff" text-anchor="middle" letter-spacing="2">BOUTIQUE NUMÉRIQUE #1 🇩🇿</text>

  <!-- Main headline -->
  <text x="80" y="300" font-family="'Arial Black', sans-serif" font-size="62" font-weight="900" fill="white">Votre Boutique</text>
  <text x="80" y="375" font-family="'Arial Black', sans-serif" font-size="62" font-weight="900" fill="url(#grad)">Numérique Premium</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="22" fill="#adaaaa">Logiciels · Templates · Ebooks · Cours — Paiement COD en DZD</text>

  <!-- Stats -->
  <g transform="translate(80, 490)">
    <rect width="150" height="60" rx="12" fill="#1a1a1a"/>
    <text x="75" y="28" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#61cdff" text-anchor="middle">500+</text>
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="11" fill="#adaaaa" text-anchor="middle">Produits</text>
  </g>
  <g transform="translate(250, 490)">
    <rect width="150" height="60" rx="12" fill="#1a1a1a"/>
    <text x="75" y="28" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#aa8bff" text-anchor="middle">1000+</text>
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="11" fill="#adaaaa" text-anchor="middle">Clients</text>
  </g>
  <g transform="translate(420, 490)">
    <rect width="150" height="60" rx="12" fill="#1a1a1a"/>
    <text x="75" y="28" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#34d399" text-anchor="middle">4.9★</text>
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="11" fill="#adaaaa" text-anchor="middle">Satisfaction</text>
  </g>

  <!-- Right decoration: mock product card -->
  <g transform="translate(780, 120)">
    <rect width="340" height="400" rx="24" fill="#1a1a1a" opacity="0.9"/>
    <rect width="340" height="180" rx="24" fill="#262626"/>
    <rect width="340" height="160" fill="#262626"/>
    <circle cx="170" cy="90" r="50" fill="#61cdff" fill-opacity="0.1"/>
    <text x="170" y="100" font-family="'Arial Black', sans-serif" font-size="40" fill="#61cdff" text-anchor="middle" opacity="0.6">⚡</text>
    <text x="20" y="210" font-family="'Arial Black', sans-serif" font-size="15" fill="white">Dashboard Admin Pro</text>
    <text x="20" y="235" font-family="Arial, sans-serif" font-size="12" fill="#adaaaa">Template Next.js Premium</text>
    <rect x="20" y="258" width="60" height="22" rx="11" fill="#61cdff" fill-opacity="0.1"/>
    <text x="50" y="273" font-family="Arial, sans-serif" font-size="10" fill="#61cdff" text-anchor="middle" font-weight="700">templates</text>
    <text x="20" y="330" font-family="'Arial Black', sans-serif" font-size="26" fill="url(#grad)" font-weight="900">2 500 DZD</text>
    <text x="20" y="355" font-family="Arial, sans-serif" font-size="13" fill="#adaaaa" text-decoration="line-through">4 500 DZD</text>
    <rect x="20" y="372" width="300" height="44" rx="22" fill="url(#grad)"/>
    <text x="170" y="400" font-family="'Arial Black', sans-serif" font-size="14" fill="#004259" text-anchor="middle" font-weight="900">Acheter Maintenant</text>
  </g>
</svg>
